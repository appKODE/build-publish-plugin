name: Release Libraries

on:
  push:
    tags:
      - '*'

permissions:
  contents: read
  packages: write

jobs:
  publish-libraries:
    runs-on: ubuntu-latest
    environment: release
    if: ${{ !contains(github.event.head_commit.message, 'ci skip') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare publishing credentials
        env:
          NEXUS_USERTOKEN_NAME: ${{ secrets.NEXUS_USERTOKEN_NAME }}
          NEXUS_USERTOKEN_PASSWORD: ${{ secrets.NEXUS_USERTOKEN_PASSWORD }}
          SIGNING_KEY_ID: ${{ secrets.SIGNING_KEY_ID }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_SECRET_KEY_RING_FILE_BASE64: ${{ secrets.SIGNING_SECRET_KEY_RING_FILE_BASE64 }}
        run: |
          required_vars=(
            NEXUS_USERTOKEN_NAME
            NEXUS_USERTOKEN_PASSWORD
            SIGNING_KEY_ID
            SIGNING_PASSWORD
            SIGNING_SECRET_KEY_RING_FILE_BASE64
          )

          for var in "${required_vars[@]}"; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: ${var}"
              exit 1
            fi
          done

          keyring_file="${RUNNER_TEMP}/signing-secring.gpg"
          echo "${SIGNING_SECRET_KEY_RING_FILE_BASE64}" | base64 --decode > "${keyring_file}"
          chmod 600 "${keyring_file}"

          mkdir -p "${HOME}/.gradle"
          {
            echo "mavenCentralUsername=${NEXUS_USERTOKEN_NAME}"
            echo "mavenCentralPassword=${NEXUS_USERTOKEN_PASSWORD}"
            echo "signing.keyId=${SIGNING_KEY_ID}"
            echo "signing.password=${SIGNING_PASSWORD}"
            echo "signing.secretKeyRingFile=${keyring_file}"
          } >> "${HOME}/.gradle/gradle.properties"

      # Publishes every shared `build-publish-novo-*` module (plugin-core + all client-*) to
      # Maven Central via the vanniktech plugin. Runs the unqualified task so it fans out to all
      # subprojects that define it. Must reach Central so consumers of the published plugins — which
      # now depend on `build-publish-novo-core` at `compile` scope — can resolve it.
      - name: Publish libraries to Maven Central
        run: >-
          ./gradlew --no-daemon --stacktrace --no-configuration-cache
          --project-dir shared publishAndReleaseToMavenCentral
